services:
  web:
    build: .
    # command: gunicorn is already specified in Dockerfile
    restart: unless-stopped
    expose:
      - "5003"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-autowp}:${POSTGRES_PASSWORD:-securepassword}@postgres:5432/${POSTGRES_DB:-autowpdb}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-}
      - FERNET_KEY=${FERNET_KEY:-}
      - AUTOWP_RUNTIME_DIR=/app/runtime
    volumes:
      - autowp_runtime:/app/runtime
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.autowp-web.rule=Host(`autowp.web.id`)"
      - "traefik.http.services.autowp-web.loadbalancer.server.port=5003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: unless-stopped
    command: rq worker --with-scheduler -u redis://redis:6379/0 high default low
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-autowp}:${POSTGRES_PASSWORD:-securepassword}@postgres:5432/${POSTGRES_DB:-autowpdb}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-}
      - FERNET_KEY=${FERNET_KEY:-}
      - AUTOWP_RUNTIME_DIR=/app/runtime
    volumes:
      - autowp_runtime:/app/runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: .
    restart: unless-stopped
    command: python dispatcher.py
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-autowp}:${POSTGRES_PASSWORD:-securepassword}@postgres:5432/${POSTGRES_DB:-autowpdb}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-}
      - FERNET_KEY=${FERNET_KEY:-}
      - AUTOWP_RUNTIME_DIR=/app/runtime
    volumes:
      - autowp_runtime:/app/runtime
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-autowp}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-securepassword}
      - POSTGRES_DB=${POSTGRES_DB:-autowpdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  autowp_runtime:
